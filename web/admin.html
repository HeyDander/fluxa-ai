<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fluxa-ai admin</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <div class="admin-brand">
          <p class="kicker">fluxa-ai</p>
          <h1>Admin</h1>
          <p class="muted">Пользователи, кредиты, блокировки</p>
        </div>

        <div class="admin-card">
          <div id="admin-status" class="muted">Нет входа</div>
          <button id="refresh-users" class="admin-button hidden">Обновить</button>
          <button id="admin-logout" class="admin-button ghost hidden">Выйти</button>
        </div>
      </aside>

      <main class="admin-main">
        <section id="admin-login-view" class="panel">
          <p class="kicker">Admin Access</p>
          <h2>Подключение к сайту</h2>
          <form id="admin-login-form" class="admin-form">
            <label>
              <span>API URL</span>
              <input id="admin-api-url" type="text" placeholder="https://твойдомен.up.railway.app" />
            </label>
            <label>
              <span>API key</span>
              <input id="admin-api-key" type="password" placeholder="ADMIN_API_KEY" />
            </label>
            <button class="admin-button" type="submit">Подключить</button>
          </form>
          <p id="admin-login-error" class="error-text"></p>
        </section>

        <section id="admin-dashboard" class="hidden">
          <div class="panel panel-row">
            <div>
              <p class="kicker">Users</p>
              <h2>Пользователи</h2>
            </div>
            <input id="user-search" class="search-input" type="text" placeholder="Поиск по логину" />
          </div>

          <div class="panel">
            <div id="users-summary" class="muted">Пользователей: 0</div>
          </div>

          <section class="admin-grid">
            <section id="users-list" class="users-grid"></section>

            <section id="selected-user-panel" class="panel hidden">
              <p class="kicker">Operator</p>
              <h2 id="selected-username">Пользователь</h2>
              <div id="selected-user-meta" class="muted"></div>

              <div id="selected-chat" class="selected-chat"></div>

              <section class="fun-panel">
                <div class="fun-panel-head">
                  <div>
                    <p class="kicker">Fun Actions</p>
                    <h3>Быстрые кнопки</h3>
                  </div>
                  <p class="muted">Отправляют лёгкие сообщения от поддержки</p>
                </div>
                <div id="fun-actions" class="fun-actions"></div>
                <p id="fun-actions-error" class="error-text"></p>
              </section>

              <form id="operator-form" class="admin-form">
                <label>
                  <span>Ответ оператором</span>
                  <textarea id="operator-message" rows="5" placeholder="Сообщение пользователю"></textarea>
                </label>
                <button class="admin-button" type="submit">Отправить</button>
              </form>
              <p id="operator-error" class="error-text"></p>
            </section>
          </section>
        </section>
      </main>
    </div>

    <script src="./admin.js"></script>
  </body>
</html>
